name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'abl-employee-app/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Android SDK ───────────────────────────────────────────────────────
      - name: Set up Android SDK (SDK 36 + build-tools 35.0.0)
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          accept-android-sdk-licenses: true
          packages: |
            platforms;android-36
            build-tools;35.0.0
            platform-tools

      # ── 4. Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: abl-employee-app/package-lock.json

      # ── 5. Install JS deps ────────────────────────────────────────────────────
      - name: Install dependencies
        working-directory: abl-employee-app
        run: npm install

      # ── 6. Write .env for Vite ────────────────────────────────────────────────
      - name: Write .env
        working-directory: abl-employee-app
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" >> .env

      # ── 7. Build web assets ───────────────────────────────────────────────────
      - name: Build Vite web assets
        working-directory: abl-employee-app
        run: npx vite build

      # ── 8. Sync Capacitor → Android ───────────────────────────────────────────
      - name: Capacitor sync
        working-directory: abl-employee-app
        run: npx cap sync android

      # ── 9. Gradle cache ───────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('abl-employee-app/android/**/*.gradle*', 'abl-employee-app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 10. Make gradlew executable ───────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x abl-employee-app/android/gradlew

      # ── 11. Build Debug APK ───────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: abl-employee-app/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 12. Upload APK artifact ───────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ABL-Payroll-Solutions-V1.0-Debug-APK
          path: abl-employee-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      # ── 13. Build Summary ─────────────────────────────────────────────────────
      - name: Print APK info
        run: |
          APK_PATH="abl-employee-app/android/app/build/outputs/apk/debug/app-debug.apk"
          echo "## ✅ Build SUCCESS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App Name | ABL Payroll Solutions V1.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | com.ablpayroll.employee |" >> $GITHUB_STEP_SUMMARY
          echo "| APK File | \`app-debug.apk\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $(du -sh $APK_PATH | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**⬇️ Download the APK from the Artifacts section below.**" >> $GITHUB_STEP_SUMMARY
