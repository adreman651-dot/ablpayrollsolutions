name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'abl-employee-app/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug APK
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. JDK 17 ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Use pre-installed Android SDK on ubuntu-22.04 ─────────────────────
      #   ubuntu-22.04 ships with Android SDK 34 + build-tools 34.0.0
      #   ANDROID_HOME is already set to /usr/local/lib/android/sdk
      - name: Verify Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/platforms/ || true
          ls $ANDROID_HOME/build-tools/ || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      # ── 4. Node 20 ────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: abl-employee-app/package-lock.json

      # ── 5. Install JS deps ────────────────────────────────────────────────────
      - name: Install npm dependencies
        working-directory: abl-employee-app
        run: npm install

      # ── 6. Write .env ─────────────────────────────────────────────────────────
      - name: Write .env
        working-directory: abl-employee-app
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" >> .env

      # ── 7. Vite build ─────────────────────────────────────────────────────────
      - name: Build web assets
        working-directory: abl-employee-app
        run: npx vite build

      # ── 8. Capacitor sync ─────────────────────────────────────────────────────
      - name: Capacitor sync android
        working-directory: abl-employee-app
        run: npx cap sync android

      # ── 9. Gradle cache ───────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('abl-employee-app/android/**/*.gradle*') }}
          restore-keys: gradle-

      # ── 10. gradlew permission ────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x abl-employee-app/android/gradlew

      # ── 11. Build Debug APK ───────────────────────────────────────────────────
      - name: Gradle assembleDebug
        working-directory: abl-employee-app/android
        run: ./gradlew assembleDebug --no-daemon --warning-mode=all
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 12. Upload APK ────────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ABL-Payroll-Solutions-V1.0-Debug-APK
          path: abl-employee-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      # ── 13. Summary ───────────────────────────────────────────────────────────
      - name: Build summary
        run: |
          APK="abl-employee-app/android/app/build/outputs/apk/debug/app-debug.apk"
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "## ✅ APK Build SUCCESS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | ABL Payroll Solutions V1.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | com.ablpayroll.employee |" >> $GITHUB_STEP_SUMMARY
          echo "| File | app-debug.apk |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download the APK from the Artifacts section of this run.**" >> $GITHUB_STEP_SUMMARY
